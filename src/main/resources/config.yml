##                               Configuration                                ##
#################################################################################

## Language used for player-facing plugin messages.
## Supported by default: "en", "de".
language: "en"

## General settings.
basic:

  # Prefix used before plugin messages.
  server-name: "MyServer"

  # Enable or disable the plugin's custom /help command.
  customhelp: true

## Particle settings.
particles:

  # Enable or disable all furnace particle effects.
  enabled: true

  # Only display particles while the furnace is actively smelting.
  only_when_active: false

## Furnace upgrade settings.
## UpgradeFurnace is intentionally balanced around levels 1 through 5.
#
# speed_multiplier:
#   Divides the furnace cook time.
#   Higher values = faster smelting.
#
# particle:
#   Particle effect displayed for this upgrade tier.
#
# bonus_chance:
#   Chance from 0.0 to 1.0 to add bonus output after smelting.
#
# bonus_max_items:
#   Maximum extra items added when the bonus chance succeeds.
requirements:
  1:
    material: COPPER_INGOT
    amount: 16
    xp_levels: 5
    speed_multiplier: 1.15
    particle: SMOKE
    bonus_chance: 0.0
    bonus_max_items: 0

  2:
    material: IRON_INGOT
    amount: 24
    xp_levels: 10
    speed_multiplier: 1.35
    particle: FLAME
    bonus_chance: 0.10
    bonus_max_items: 1

  3:
    material: GOLD_INGOT
    amount: 16
    xp_levels: 15
    speed_multiplier: 2.0
    particle: CLOUD
    bonus_chance: 0.16
    bonus_max_items: 1

  4:
    material: DIAMOND
    amount: 8
    xp_levels: 20
    speed_multiplier: 4.0
    particle: SOUL_FIRE_FLAME
    bonus_chance: 0.22
    bonus_max_items: 2

  5:
    material: NETHERITE_INGOT
    amount: 1
    xp_levels: 30
    speed_multiplier: 8.0
    particle: TOTEM_OF_UNDYING
    bonus_chance: 0.30
    bonus_max_items: 2
